<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>analytics — mishas blog</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V9P0264WE5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-V9P0264WE5');
  </script>
  <style>
    .analytics-wrap {
      margin-top: 20px;
      border: 1px solid var(--border-light);
    }
    .analytics-embed {
      display: block;
      width: 100%;
      height: 600px;
      border: none;
    }
    .analytics-note {
      color: var(--muted);
      font-size: 0.85rem;
      margin: 4px 0 0 0;
    }
    @media (max-width: 700px) {
      .analytics-embed {
        height: 420px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>mishas blog</h1>
    <nav>
      <a href="index.html">blog</a>
      <a href="music.html">music</a>
      <a href="media.html">media</a>
      <a href="analytics.html">analytics</a>
      <div class="slider-wrap">
        <span class="slider-label">theme</span>
        <input type="range" id="theme-slider" min="0" max="100" value="0" aria-label="theme">
      </div>
    </nav>
  </header>

  <main>

    <h2>analytics</h2>
    <p class="analytics-note">live site stats — no personal data collected.</p>

    <div class="analytics-wrap">
      <iframe
        class="analytics-embed"
        src="https://lookerstudio.google.com/embed/reporting/e8e38d2e-ef01-48f3-9058-fae9f217b009/page/kIV1C"
        allowfullscreen
        sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
      </iframe>
    </div>

  </main>

  <footer>
    <p>&#169; 2026 misha. Original written content and essays on this site are licensed under <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank">CC BY-NC-ND 4.0</a>. Linked music belongs to its respective artists.</p>
  </footer>

  <script>
    const LIGHT = {
      '--bg':           [255, 255, 255],
      '--text':         [ 34,  34,  34],
      '--muted':        [136, 136, 136],
      '--border':       [ 34,  34,  34],
      '--border-light': [238, 238, 238],
      '--link':         [ 34,  34,  34],
      '--link-muted':   [136, 136, 136],
      '--footer-text':  [192, 192, 192],
      '--footer-link':  [192, 192, 192],
    };
    const DARK = {
      '--bg':           [ 40,  42,  54],
      '--text':         [248, 248, 242],
      '--muted':        [ 98, 114, 164],
      '--border':       [ 98, 114, 164],
      '--border-light': [ 68,  71,  90],
      '--link':         [189, 147, 249],
      '--link-muted':   [ 98, 114, 164],
      '--footer-text':  [ 68,  63,  90],
      '--footer-link':  [110,  60,  90],
    };

    function applyTheme(t) {
      const root = document.documentElement.style;
      for (const key in LIGHT) {
        const l = LIGHT[key], d = DARK[key];
        const r = Math.round(l[0] + (d[0] - l[0]) * t);
        const g = Math.round(l[1] + (d[1] - l[1]) * t);
        const b = Math.round(l[2] + (d[2] - l[2]) * t);
        root.setProperty(key, `rgb(${r},${g},${b})`);
      }
    }

    const slider = document.getElementById('theme-slider');
    const saved = parseFloat(localStorage.getItem('theme-value') || '0');
    slider.value = saved * 100;
    applyTheme(saved);

    function onSliderChange() {
      const t = slider.value / 100;
      applyTheme(t);
      localStorage.setItem('theme-value', t);
    }

    slider.addEventListener('input', onSliderChange);
    slider.addEventListener('change', onSliderChange);
    slider.addEventListener('touchmove', onSliderChange, { passive: true });
  </script>
</body>
</html>
