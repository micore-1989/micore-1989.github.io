<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>music — mishas blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>mishas blog</h1>
    <nav>
      <a href="index.html">blog</a>
      <a href="music.html">music</a>
      <input type="range" id="theme-slider" min="0" max="100" value="0" aria-label="theme">
    </nav>
  </header>

  <main>

    <h2>music</h2>

    <!-- ============================================================
         MUSIC LIST — add new entries here as you add songs to posts.
         Format: song title, artist, and the entry it came from.
         ============================================================ -->

    <ul class="music-list">
      <li>
        <a href="https://open.spotify.com/track/2nzfebt7eoKpUNNsDVWJ1Y" target="_blank">I'm God — Southbound</a>
        <span class="music-entry">entry02: twentieth.</span>
      </li>
      <li>
        <a href="https://open.spotify.com/track/0g9DHUWhX2j3D9pGjBPFa5" target="_blank">Mr. Chow. — fakemink</a>
        <span class="music-entry">entry01: Carpe Diem!</span>
      </li>
    </ul>

  </main>

  <script>
    const LIGHT = {
      '--bg':           [255, 255, 255],
      '--text':         [ 34,  34,  34],
      '--muted':        [136, 136, 136],
      '--border':       [ 34,  34,  34],
      '--border-light': [238, 238, 238],
      '--link':         [ 34,  34,  34],
      '--link-muted':   [136, 136, 136],
    };
    const DARK = {
      '--bg':           [ 40,  42,  54],
      '--text':         [248, 248, 242],
      '--muted':        [ 98, 114, 164],
      '--border':       [ 98, 114, 164],
      '--border-light': [ 68,  71,  90],
      '--link':         [189, 147, 249],
      '--link-muted':   [ 98, 114, 164],
    };

    function applyTheme(t) {
      const root = document.documentElement.style;
      for (const key in LIGHT) {
        const l = LIGHT[key], d = DARK[key];
        const r = Math.round(l[0] + (d[0] - l[0]) * t);
        const g = Math.round(l[1] + (d[1] - l[1]) * t);
        const b = Math.round(l[2] + (d[2] - l[2]) * t);
        root.setProperty(key, `rgb(${r},${g},${b})`);
      }
    }

    const slider = document.getElementById('theme-slider');
    const saved = parseFloat(localStorage.getItem('theme-value') || '0');
    slider.value = saved * 100;
    applyTheme(saved);

    function onSliderChange() {
      const t = slider.value / 100;
      applyTheme(t);
      localStorage.setItem('theme-value', t);
    }

    slider.addEventListener('input', onSliderChange);
    slider.addEventListener('change', onSliderChange);
    slider.addEventListener('touchmove', onSliderChange, { passive: true });
  </script>
</body>
</html>
