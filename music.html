<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>music — mishas blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>mishas blog</h1>
    <nav>
      <a href="index.html">blog</a>
      <a href="music.html">music</a>
      <button id="theme-toggle" aria-label="toggle theme">light</button>
    </nav>
  </header>

  <main>

    <h2>music</h2>

    <!-- ============================================================
         MUSIC LIST — add new entries here as you add songs to posts.
         Format: song title, artist, and the entry it came from.
         ============================================================ -->

    <ul class="music-list">
      <li>
        <a href="https://open.spotify.com/track/2nzfebt7eoKpUNNsDVWJ1Y" target="_blank">I'm God — Southbound</a>
        <span class="music-entry">entry02: twentieth.</span>
      </li>
      <li>
        <a href="https://open.spotify.com/track/0g9DHUWhX2j3D9pGjBPFa5" target="_blank">Mr. Chow. — fakemink</a>
        <span class="music-entry">entry01: Carpe Diem!</span>
      </li>
    </ul>

  </main>

  <script>
    const btn = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') { document.body.classList.add('dark'); btn.textContent = 'dark'; }
    btn.addEventListener('click', () => {
      const isDark = document.body.classList.toggle('dark');
      btn.textContent = isDark ? 'dark' : 'light';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
